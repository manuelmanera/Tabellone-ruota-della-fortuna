<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Ruota - Sistema Unificato</title>
    <style>
        :root {
            --bg: #000;
            --board: #001a33;
            --frame-border: #fff;
            --accent: #a020f0;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        #menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
            background: radial-gradient(circle, #001f4d 0%, #000 100%);
        }

        .m-btn {
            width: 280px;
            padding: 25px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 3px solid #fff;
            border-radius: 10px;
            background: transparent;
            color: white;
            text-transform: uppercase;
        }

        #view-tabellone { display: none; flex-direction: column; align-items: center; }
        
        .board {
            width: 95vw; height: 53.4vw; max-width: 1000px; max-height: 562px;
            background: var(--board);
            position: relative; border-radius: 80px; border: 5px solid #111;
            display: flex; justify-content: center; align-items: center;
            margin-top: 20px;
        }

        .frame {
            width: 82%; height: 58%; background: #0a2540; border: 4px solid var(--frame-border);
            position: relative; display: grid; grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(4, 1fr); gap: 3px; padding: 5px;
        }

        .frame::before, .frame::after {
            content: ''; position: absolute; width: 20px; height: 45%;
            background: #0a2540; border: 4px solid var(--frame-border); top: 27.5%;
        }
        .frame::before { left: -28px; border-right: none; }
        .frame::after { right: -28px; border-left: none; }

        .tile { background: linear-gradient(135deg, #103050 0%, #1a4d80 100%); perspective: 600px; }
        .tile.active { background: #fff; }
        .inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; display: flex; justify-content: center; align-items: center; }
        .tile.revealed .inner { transform: rotateY(180deg); }
        .tile.highlight { background: var(--accent) !important; box-shadow: 0 0 20px var(--accent); }
        .letter { position: absolute; color: black; font-size: 3vw; font-weight: 900; backface-visibility: hidden; transform: rotateY(180deg); }

        .p-disp { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .p-c { padding: 10px; border-bottom: 5px solid #ccc; min-width: 100px; text-align: center; background: rgba(255,255,255,0.05); }
        .p-n { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; }
        .p-s { font-size: 1.8rem; font-weight: 900; }

        #view-regia { display: none; padding: 20px; background: #1a1a1a; min-height: 100vh; flex-direction: column; align-items: center; }
        .r-cont { max-width: 800px; width: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .r-box { background: #333; padding: 20px; border-radius: 10px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; font-weight: bold; box-sizing: border-box; }
        button { cursor: pointer; color: white; text-transform: uppercase; }
        .r-item { background: #444; padding: 8px; margin-top: 8px; border-radius: 5px; display: flex; align-items: center; gap: 10px; }

        @media (min-width: 1000px) { .letter { font-size: 2rem; } }
    </style>
</head>
<body>

    <div id="menu">
        <button class="m-btn" onclick="start('tabellone')">Tabellone</button>
        <button class="m-btn" onclick="start('regia')" style="border-color: var(--accent);">Regia</button>
    </div>

    <div id="view-tabellone">
        <div class="board"><div id="grid" class="frame"></div></div>
        <div id="p-list" class="p-disp"></div>
    </div>

    <div id="view-regia">
        <div class="r-cont">
            <div class="r-box">
                <input type="text" id="f_in" placeholder="FRASE">
                <button onclick="setF()" style="background:#0055ff">CARICA</button>
                <hr style="margin:15px 0; opacity:0.2">
                <input type="text" id="l_in" maxlength="1" style="text-align:center; font-size:1.5rem">
                <button onclick="preL()" style="background:var(--accent)">PRENOTA (1.2s)</button>
                <button onclick="flipL()" style="background:#28a745">GIRA</button>
                <button onclick="sol()" style="background:#cc0000; margin-top:15px">SOLUZIONE</button>
            </div>
            <div class="r-box">
                <div style="display:flex; gap:5px">
                    <input type="text" id="pn" placeholder="Nome">
                    <input type="color" id="pc" value="#ffffff" style="width:60px; padding:0">
                </div>
                <button onclick="addP()" style="background:orange; color:black">AGGIUNGI GIOCATORE</button>
                <div id="r-pl"></div>
                <button onclick="res()" style="background:#555; margin-top:20px">RESET</button>
            </div>
        </div>
    </div>

    <script>
        const bc = new BroadcastChannel('ruota_chan');
        let mode = '';
        let players = [];

        function start(m) {
            mode = m;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('view-' + m).style.display = 'flex';
            if(m === 'tabellone') initG();
        }

        function initG() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for(let i=0; i<48; i++) g.innerHTML += `<div class="tile" id="t-${i}"><div class="inner"><div class="letter"></div></div></div>`;
        }

        bc.onmessage = (e) => {
            if(mode !== 'tabellone') return;
            const d = e.data;
            if(d.type === 'LOAD') {
                initG();
                d.tiles.forEach(t => {
                    let el = document.getElementById(`t-${t.id}`);
                    el.classList.add('active');
                    el.setAttribute('data-l', t.l);
                    el.querySelector('.letter').innerText = t.l;
                });
            }
            if(d.type === 'PRE') {
                document.querySelectorAll(`.tile[data-l='${d.l}']:not(.revealed)`).forEach((t, i) => {
                    setTimeout(() => t.classList.add('highlight'), i * 1200);
                });
            }
            if(d.type === 'FLIP') {
                document.querySelectorAll('.highlight').forEach(t => {
                    t.classList.remove('highlight');
                    t.classList.add('revealed');
                });
            }
            if(d.type === 'SYNC_P') {
                const c = document.getElementById('p-list');
                c.innerHTML = '';
                d.list.forEach((p, i) => {
                    c.innerHTML += `<div class="p-c" style="border-color:${p.color}"><div class="p-n">${p.name}</div><div class="p-s" id="s-${i}">${p.score}</div></div>`;
                });
            }
            if(d.type === 'UP_S') {
                const el = document.getElementById(`s-${d.i}`);
                if(el) el.innerText = d.v;
            }
            if(d.type === 'SOL') document.querySelectorAll('.active').forEach(t => t.classList.add('revealed'));
            if(d.type === 'RES') { initG(); document.getElementById('p-list').innerHTML = ''; }
        };

        function addP() {
            players.push({ name: document.getElementById('pn').value || "P", color: document.getElementById('pc').value, score: 0 });
            document.getElementById('pn').value = '';
            syncR();
        }

        function syncR() {
            const l = document.getElementById('r-pl');
            l.innerHTML = '';
            players.forEach((p, i) => {
                l.innerHTML += `<div class="r-item" style="border-left:5px solid ${p.color}"><span style="flex:1">${p.name}</span><input type="number" value="${p.score}" oninput="upS(${i},this.value)" style="width:70px"></div>`;
            });
            bc.postMessage({ type: 'SYNC_P', list: players });
        }

        function upS(i, v) {
            players[i].score = v;
            bc.postMessage({ type: 'UP_S', i: i, v: v });
        }

        function setF() {
            const f = document.getElementById('f_in').value.toUpperCase();
            let r = 1, b = "", ts = [];
            f.split(" ").forEach(p => {
                if((b + p).length <= 11) b += (b === "" ? "" : " ") + p;
                else { buildR(b, r, ts); r++; b = p; }
            });
            buildR(b, r, ts);
            bc.postMessage({ type: 'LOAD', tiles: ts });
        }

        function buildR(txt, row, arr) {
            if(row > 3) return;
            let s = Math.floor((12 - txt.length) / 2);
            for(let i=0; i<txt.length; i++) if(txt[i] !== " ") arr.push({ id: (row*12)+s+i, l: txt[i] });
        }

        function preL() { bc.postMessage({ type: 'PRE', l: document.getElementById('l_in').value.toUpperCase() }); }
        function flipL() { bc.postMessage({ type: 'FLIP' }); document.getElementById('l_in').value = ''; }
        function sol() { bc.postMessage({ type: 'SOL' }); }
        function res() { players = []; syncR(); bc.postMessage({ type: 'RES' }); }
    </script>
</body>
</html>
