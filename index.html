<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Ruota Cloud - Fix Righe</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwg3lPCXsjjdPOuxLzsZ8J_JuZ37JSv5w",
            authDomain: "ruotadellafortuna-28f02.firebaseapp.com",
            databaseURL: "https://ruotadellafortuna-28f02-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ruotadellafortuna-28f02",
            storageBucket: "ruotadellafortuna-28f02.firebasestorage.app",
            messagingSenderId: "346375806708",
            appId: "1:346375806708:web:fee4f15879e1dbfb2788a1",
            measurementId: "G-BW7982XQ7Y"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'game_state');

        window.start = (m) => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('view-' + m).style.display = 'flex';
            if(m === 'tabellone') listenCloud();
            if(m === 'regia') initRegia();
        };

        function listenCloud() {
            initGrid();
            onValue(gameRef, (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                
                // Reset grafico prima di applicare lo stato
                document.querySelectorAll('.tile').forEach(t => {
                    t.classList.remove('active', 'revealed', 'highlight');
                    t.querySelector('.letter').innerText = '';
                });

                if(data.tiles) {
                    data.tiles.forEach(t => {
                        let el = document.getElementById(`t-${t.id}`);
                        if(el) {
                            el.classList.add('active');
                            el.querySelector('.letter').innerText = t.l;
                            if(t.rev) el.classList.add('revealed');
                            if(t.high) el.classList.add('highlight');
                        }
                    });
                }

                const c = document.getElementById('p-list');
                c.innerHTML = '';
                if(data.players) {
                    data.players.forEach((p, i) => {
                        c.innerHTML += `<div class="p-c" style="border-color:${p.color}"><div class="p-n">${p.name}</div><div class="p-s">${p.score}</div></div>`;
                    });
                }
            });
        }

        let localPlayers = [];
        let currentTiles = [];

        window.addP = () => {
            localPlayers.push({ name: document.getElementById('pn').value || "P", color: document.getElementById('pc').value, score: 0 });
            update(gameRef, { players: localPlayers });
            document.getElementById('pn').value = '';
        };

        window.upS = (i, v) => {
            localPlayers[i].score = v;
            update(gameRef, { players: localPlayers });
        };

        window.removeP = (i) => {
            localPlayers.splice(i, 1);
            update(gameRef, { players: localPlayers });
        };

        window.setF = () => {
            const f = document.getElementById('f_in').value.toUpperCase();
            let r = 0, b = "", ts = [];
            f.split(" ").forEach(p => {
                if((b + p).length <= 11) b += (b === "" ? "" : " ") + p;
                else { buildR(b, r, ts); r++; b = p; }
            });
            buildR(b, r, ts);
            update(gameRef, { tiles: ts });
        };

        function buildR(txt, row, arr) {
            if(row > 3) return; // Limite 4 righe (0,1,2,3)
            let s = Math.floor((12 - txt.length) / 2);
            for(let i=0; i<txt.length; i++) {
                if(txt[i] !== " ") arr.push({ id: (row * 12) + s + i, l: txt[i], rev: false, high: false });
            }
        }

        window.preL = () => {
            const lettr = document.getElementById('l_in').value.toUpperCase();
            let delayCount = 0;
            currentTiles.forEach((t, index) => {
                if(t.l === lettr && !t.rev) {
                    setTimeout(() => {
                        currentTiles[index].high = true;
                        update(gameRef, { tiles: currentTiles });
                    }, delayCount * 1200);
                    delayCount++;
                }
            });
        };

        window.flipL = () => {
            currentTiles.forEach((t, index) => {
                if(t.high) { currentTiles[index].high = false; currentTiles[index].rev = true; }
            });
            update(gameRef, { tiles: currentTiles });
            document.getElementById('l_in').value = '';
        }

        window.sol = () => {
            currentTiles.forEach((t, index) => currentTiles[index].rev = true);
            update(gameRef, { tiles: currentTiles });
        };

        window.resTab = () => {
            update(gameRef, { tiles: [] });
            document.getElementById('f_in').value = '';
        };

        window.resAll = () => {
            set(gameRef, { tiles: [], players: [] }).then(() => location.reload());
        };

        function initGrid() {
            const g = document.getElementById('grid');
            if(g.children.length > 0) return;
            for(let i=0; i<48; i++) g.innerHTML += `<div class="tile" id="t-${i}"><div class="inner"><div class="letter"></div></div></div>`;
        }

        function initRegia() {
            onValue(gameRef, (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                localPlayers = data.players || [];
                currentTiles = data.tiles || [];
                const l = document.getElementById('r-pl');
                l.innerHTML = '';
                localPlayers.forEach((p, i) => {
                    l.innerHTML += `
                        <div class="r-item" style="border-left:5px solid ${p.color}">
                            <span>${p.name}</span>
                            <div style="display:flex; gap:5px">
                                <input type="number" value="${p.score}" oninput="upS(${i},this.value)" style="width:60px">
                                <button onclick="removeP(${i})" style="width:30px; background:red; padding:5px">X</button>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
    <style>
        :root { --bg: #000; --board: #001a33; --accent: #a020f0; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; margin: 0; }
        #menu { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 20px; }
        .m-btn { width: 280px; padding: 25px; cursor: pointer; border: 3px solid #fff; border-radius: 10px; background: transparent; color: white; text-transform: uppercase; font-weight: bold; }
        #view-tabellone, #view-regia { display: none; flex-direction: column; align-items: center; }
        .board { width: 95vw; height: 53.4vw; max-width: 900px; background: var(--board); position: relative; border-radius: 60px; border: 5px solid #111; display: flex; justify-content: center; align-items: center; margin-top: 20px; box-shadow: 0 0 30px rgba(0, 150, 255, 0.3); }
        .frame { width: 82%; height: 58%; background: #0a2540; border: 4px solid #fff; display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(4, 1fr); gap: 3px; padding: 5px; position: relative; }
        .tile { background: linear-gradient(135deg, #103050 0%, #1a4d80 100%); perspective: 600px; }
        .tile.active { background: #fff; }
        .inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; display: flex; justify-content: center; align-items: center; }
        .tile.revealed .inner { transform: rotateY(180deg); }
        .tile.highlight { background: var(--accent) !important; box-shadow: 0 0 20px var(--accent); }
        .letter { position: absolute; color: black; font-size: 2.2rem; font-weight: 900; backface-visibility: hidden; transform: rotateY(180deg); }
        .p-disp { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .p-c { padding: 10px 20px; border-bottom: 5px solid #ccc; text-align: center; min-width: 100px; background: rgba(255,255,255,0.05); }
        .p-s { font-size: 2rem; }
        .r-cont { max-width: 850px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .r-box { background: #333; padding: 15px; border-radius: 10px; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 5px; border: none; font-weight: bold; box-sizing: border-box; }
        button { cursor: pointer; color: white; text-transform: uppercase; }
        .r-item { background: #444; padding: 8px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="menu">
        <button class="m-btn" onclick="start('tabellone')">Schermo Tabellone</button>
        <button class="m-btn" onclick="start('regia')" style="border-color: var(--accent);">Console Regia</button>
    </div>

    <div id="view-tabellone">
        <div class="board"><div id="grid" class="frame"></div></div>
        <div id="p-list" class="p-disp"></div>
    </div>

    <div id="view-regia">
        <div class="r-cont">
            <div class="r-box">
                <input type="text" id="f_in" placeholder="FRASE">
                <button onclick="setF()" style="background:#0055ff">CARICA FRASE</button>
                <button onclick="resTab()" style="background:#555">RESET SOLO TABELLONE</button>
                <hr style="opacity:0.2; margin:15px 0">
                <input type="text" id="l_in" maxlength="1" style="text-align:center; font-size:1.5rem">
                <button onclick="preL()" style="background:var(--accent)">PRENOTA</button>
                <button onclick="flipL()" style="background:#28a745">GIRA</button>
                <button onclick="sol()" style="background:#cc0000">SOLUZIONE</button>
            </div>
            <div class="r-box">
                <input type="text" id="pn" placeholder="Nome Giocatore">
                <input type="color" id="pc" value="#ffffff" style="height:50px">
                <button onclick="addP()" style="background:orange; color:black">AGGIUNGI CONCORRENTE</button>
                <div id="r-pl"></div>
                <button onclick="resAll()" style="background:#000; margin-top:20px; border:1px solid red">RESET TOTALE (RELOAD)</button>
            </div>
        </div>
    </div>
</body>
</html>
